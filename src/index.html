<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <div class="container">
        <div class="backdrop">
            <div class="modal">
                <form class="form">
                    <input type="text" name="name" id="" placeholder="enter ice name">
                    <input type="text" name="type" id="" placeholder="enter type of icecream">
                    <input type="text" name="calories" id="" placeholder="enter amount of calories">
                    <input type="text" name="price" id="" placeholder="enter price per ice ball">
                    <input type="text" name="description" id="" placeholder="tell something about it">
                    <input type="text" name="image" id="" placeholder="send image">
                    <button class="submitBtn" type="submit">submit</button>
                    <button class="close" type="button">x</button>
                </form>
            </div>
        </div>
        <button class="openmodal" type="button">open modal</button>
        <!-- <div class="modal"></div> -->
        <ul class="js-list"></ul>
        <!-- <form action=""></form> -->
    </div>
